<div class="max-w-2xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md border border-gray-100">
  <h2 class="text-3xl font-bold text-orange-400 mb-6 text-center">Adicionar ao Catálogo</h2>

  <form [formGroup]="contentForm" (ngSubmit)="onSubmit()" class="space-y-5">
    
    <div>
      <label class="block text-gray-700 font-semibold mb-2">Tipo de Conteúdo</label>
      <div class="inline-flex rounded-full bg-gray-100 p-1 w-full">
        <button
          type="button"
          (click)="contentForm.get('type')?.setValue('movie')"
          class="flex-1 py-2 rounded-full text-sm font-bold transition-all text-center"
          [class.bg-orange-400]="contentForm.get('type')?.value === 'movie'"
          [class.text-white]="contentForm.get('type')?.value === 'movie'"
          [class.text-gray-500]="contentForm.get('type')?.value !== 'movie'">
          Filme
        </button>
        <button
          type="button"
          (click)="contentForm.get('type')?.setValue('series')"
          class="flex-1 py-2 rounded-full text-sm font-bold transition-all text-center"
          [class.bg-purple-500]="contentForm.get('type')?.value === 'series'"
          [class.text-white]="contentForm.get('type')?.value === 'series'"
          [class.text-gray-500]="contentForm.get('type')?.value !== 'series'">
          Série
        </button>
      </div>
    </div>

    <div>
      <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Título</label>
      <input
        id="title"
        type="text"
        formControlName="title"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-300 focus:outline-none"
        placeholder="Ex: O Padrinho, Interstellar, Friends...">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label for="genre" class="block text-sm font-medium text-gray-700 mb-1">Género</label>
        <input
          id="genre"
          type="text"
          formControlName="genre"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-300 focus:outline-none"
          placeholder="Ex: Ficção Científica, Drama">
      </div>

      <div>
        <label for="state" class="block text-sm font-medium text-gray-700 mb-1">Estado</label>
        <select
          id="state"
          formControlName="state"
          class="w-full px-4 py-2 border border-gray-300 rounded-md bg-white focus:ring-2 focus:ring-orange-300 focus:outline-none">
          <option value="Lançado">Lançado</option>
          <option value="Em Produção">Em Produção</option>
          <option value="Anunciado">Anunciado</option>
        </select>
      </div>
    </div>

    <div>
      <label for="imageurl" class="block text-sm font-medium text-gray-700 mb-1">URL da Imagem (Poster)</label>
      <input
        id="imageurl"
        type="text"
        formControlName="imageurl"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-300 focus:outline-none"
        placeholder="https://link-da-imagem.com/poster.jpg">
    </div>

    @if (contentForm.get('type')?.value === 'movie') {
      <div>
        <label for="duration" class="block text-sm font-medium text-gray-700 mb-1">Duração (em minutos)</label>
        <input
          id="duration"
          type="number"
          formControlName="duration"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-300 focus:outline-none"
          placeholder="Ex: 148">
      </div>
    } @else {
      <div>
        <label for="episodes" class="block text-sm font-medium text-gray-700 mb-1">Nº de Episódios</label>
        <input
          id="episodes"
          type="number"
          formControlName="episodes"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-300 focus:outline-none"
          placeholder="Ex: 73">
      </div>
    }

    <div>
      <label for="synopsis" class="block text-sm font-medium text-gray-700 mb-1">Sinopse</label>
      <textarea
        id="synopsis"
        rows="4"
        formControlName="synopsis"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-300 focus:outline-none resize-none"
        placeholder="Escreve o resumo da história..."></textarea>
    </div>

    @if (errorMessage) {
      <p class="text-red-500 text-sm font-semibold bg-red-50 p-2 rounded border border-red-200">{{ errorMessage }}</p>
    }
    @if (successMessage) {
      <p class="text-green-600 text-sm font-semibold bg-green-50 p-2 rounded border border-green-200">{{ successMessage }}</p>
    }

    <button
      type="submit"
      [disabled]="contentForm.invalid || isLoading"
      class="w-full py-3 text-white font-bold rounded-md transition-colors shadow-sm disabled:bg-gray-300 disabled:cursor-not-allowed"
      [class.bg-orange-400]="contentForm.get('type')?.value === 'movie'"
      [class.bg-purple-500]="contentForm.get('type')?.value === 'series'"
      [class.hover:bg-orange-500]="contentForm.get('type')?.value === 'movie'"
      [class.hover:bg-purple-600]="contentForm.get('type')?.value === 'series'">
      {{ isLoading ? 'A processar...' : 'Adicionar Conteúdo' }}
    </button>

  </form>
</div>
