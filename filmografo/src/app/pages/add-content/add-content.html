<div class="max-w-2xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md border border-gray-100">
  <h2 class="text-3xl font-bold text-orange-400 mb-6 text-center">{{ 'addcontent.title' | translate }}</h2>

  <form [formGroup]="contentForm" (ngSubmit)="onSubmit()" class="space-y-5">
    
    <div>
      <label class="block text-gray-700 font-semibold mb-2">{{ 'addcontent.type' | translate }}</label>
      <div class="inline-flex rounded-full bg-gray-100 p-1 w-full">
        <button
          type="button"
          (click)="contentForm.get('type')?.setValue('movie')"
          class="flex-1 py-2 rounded-full text-sm font-bold transition-all text-center"
          [class.bg-orange-400]="contentForm.get('type')?.value === 'movie'"
          [class.text-white]="contentForm.get('type')?.value === 'movie'"
          [class.text-gray-500]="contentForm.get('type')?.value !== 'movie'">
          {{ 'addcontent.movie' | translate }}
        </button>
        <button
          type="button"
          (click)="contentForm.get('type')?.setValue('series')"
          class="flex-1 py-2 rounded-full text-sm font-bold transition-all text-center"
          [class.bg-purple-500]="contentForm.get('type')?.value === 'series'"
          [class.text-white]="contentForm.get('type')?.value === 'series'"
          [class.text-gray-500]="contentForm.get('type')?.value !== 'series'">
          {{ 'addcontent.series' | translate }}
        </button>
      </div>
    </div>

    <div>
      <label for="title" class="block text-sm font-medium text-gray-700 mb-1">{{ 'addcontent.titleField' | translate }}</label>
      <input
        id="title"
        type="text"
        formControlName="title"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-300 focus:outline-none"
        [placeholder]="'addcontent.titlePlaceholder' | translate">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label for="genre" class="block text-sm font-medium text-gray-700 mb-1">{{ 'addcontent.genre' | translate }}</label>
        <input
          id="genre"
          type="text"
          formControlName="genre"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-300 focus:outline-none"
          [placeholder]="'addcontent.genrePlaceholder' | translate">
      </div>

      <div>
        <label for="state" class="block text-sm font-medium text-gray-700 mb-1">{{ 'addcontent.state' | translate }}</label>
        <select
          id="state"
          formControlName="state"
          class="w-full px-4 py-2 border border-gray-300 rounded-md bg-white focus:ring-2 focus:ring-orange-300 focus:outline-none">
          <option value="Lançado">{{ 'addcontent.state.released' | translate }}</option>
          <option value="Em Produção">{{ 'addcontent.state.inProduction' | translate }}</option>
          <option value="Anunciado">{{ 'addcontent.state.announced' | translate }}</option>
        </select>
      </div>
    </div>

    <div>
      <label for="imageurl" class="block text-sm font-medium text-gray-700 mb-1">{{ 'addcontent.imageurl' | translate }}</label>
      <input
        id="imageurl"
        type="text"
        formControlName="imageurl"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-300 focus:outline-none"
        placeholder="https://link-da-imagem.com/poster.jpg">
    </div>

    @if (contentForm.get('type')?.value === 'movie') {
      <div>
        <label for="duration" class="block text-sm font-medium text-gray-700 mb-1">{{ 'addcontent.duration' | translate }}</label>
        <input
          id="duration"
          type="number"
          formControlName="duration"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-300 focus:outline-none"
          [placeholder]="'addcontent.durationPlaceholder' | translate">
      </div>
    } @else {
      <div>
        <label for="episodes" class="block text-sm font-medium text-gray-700 mb-1">{{ 'addcontent.episodes' | translate }}</label>
        <input
          id="episodes"
          type="number"
          formControlName="episodes"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-300 focus:outline-none"
          [placeholder]="'addcontent.episodesPlaceholder' | translate">
      </div>
    }

    <div>
      <label for="synopsis" class="block text-sm font-medium text-gray-700 mb-1">{{ 'addcontent.synopsis' | translate }}</label>
      <textarea
        id="synopsis"
        rows="4"
        formControlName="synopsis"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-300 focus:outline-none resize-none"
        [placeholder]="'addcontent.synopsisPlaceholder' | translate"></textarea>
    </div>

    @if (errorMessage) {
      <p class="text-red-500 text-sm font-semibold bg-red-50 p-2 rounded border border-red-200">{{ errorMessage }}</p>
    }
    @if (successMessage) {
      <p class="text-green-600 text-sm font-semibold bg-green-50 p-2 rounded border border-green-200">{{ successMessage }}</p>
    }

    <button
      type="submit"
      [disabled]="contentForm.invalid || isLoading"
      class="w-full py-3 text-white font-bold rounded-md transition-colors shadow-sm disabled:bg-gray-300 disabled:cursor-not-allowed"
      [class.bg-orange-400]="contentForm.get('type')?.value === 'movie'"
      [class.bg-purple-500]="contentForm.get('type')?.value === 'series'"
      [class.hover:bg-orange-500]="contentForm.get('type')?.value === 'movie'"
      [class.hover:bg-purple-600]="contentForm.get('type')?.value === 'series'">
      {{ isLoading ? ('addcontent.processing' | translate) : ('addcontent.submit' | translate) }}
    </button>

  </form>
</div>
