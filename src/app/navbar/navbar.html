<nav class="bg-purple-400 border-b-4 border-blue-300 px-6 py-2 flex justify-between items-center text-white relative">

  <!-- Logotipo e Título -->
  <!-- O gap-6 aumenta o distanciamento entre a imagem e o texto -->
  <button type="button" (click)="goHome()" class="flex items-center gap-6 font-bold text-2xl hover:opacity-90 transition-opacity">
    <img src="/logo.png" alt="Logotipo VHS" class="h-14 w-auto drop-shadow-md">
    <span class="tracking-wide">Filmógrafo</span>
  </button>

  <!-- Barra de Pesquisa -->
  <div class="flex-1 max-w-xl mx-8 relative">
    <span class="absolute left-4 top-2 text-gray-400 text-lg">🔍</span>
    <input
      type="text"
      placeholder="Pesquisar"
      [(ngModel)]="query"
      (keydown.enter)="search()"
      class="w-full rounded-full py-2 pl-12 pr-4 text-gray-800 outline-none focus:ring-2 focus:ring-purple-300 shadow-inner">
  </div>

  <!-- Ícones de Ação (Estilo Figma) -->
  <div class="flex items-center gap-5 text-orange-400">

    <!-- Menu "+" : Adicionar filme / série -->
    <div class="relative">
      <button type="button" (click)="toggleAddMenu()" class="hover:text-orange-500 transition-colors block">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-10 h-10">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
      </button>

      @if (isAddMenuOpen) {
        <div class="absolute right-0 mt-2 w-56 bg-white text-gray-800 rounded-lg shadow-xl border border-gray-200 py-2 z-50">
          <button type="button" (click)="closeMenus()" class="w-full flex items-center gap-3 px-4 py-2 text-left hover:bg-purple-50 transition-colors">
            <span class="text-xl">🎬</span>
            <span class="font-medium">Adicionar novo filme</span>
          </button>
          <button type="button" (click)="closeMenus()" class="w-full flex items-center gap-3 px-4 py-2 text-left hover:bg-purple-50 transition-colors">
            <span class="text-xl">📺</span>
            <span class="font-medium">Adicionar Nova Série</span>
          </button>
        </div>
      }
    </div>

    <!-- Menu de Utilizador -->
    <div class="relative">
      <button type="button" (click)="toggleUserMenu()" class="hover:text-orange-500 transition-colors block">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10">
          <path fill-rule="evenodd" d="M12 2.25a5.25 5.25 0 00-5.25 5.25c0 2.22 1.373 4.12 3.327 4.935C6.155 13.065 3 16.51 3 20.625a.75.75 0 00.75.75h16.5a.75.75 0 00.75-.75c0-4.115-3.155-7.56-7.077-8.19a5.25 5.25 0 003.327-4.935 5.25 5.25 0 00-5.25-5.25zm-2.25 5.25a2.25 2.25 0 114.5 0 2.25 2.25 0 01-4.5 0z" clip-rule="evenodd" />
        </svg>
      </button>

      @if (isUserMenuOpen) {
        <div class="absolute right-0 mt-2 w-56 bg-white text-gray-800 rounded-lg shadow-xl border border-gray-200 py-2 z-50">
          <button type="button" (click)="goHome()" class="w-full px-4 py-2 text-left hover:bg-purple-50 transition-colors font-medium">
            Home
          </button>
          <button type="button" (click)="closeMenus()" class="w-full px-4 py-2 text-left hover:bg-purple-50 transition-colors font-medium">
            Ver perfil
          </button>
          <button type="button" (click)="closeMenus()" class="w-full px-4 py-2 text-left hover:bg-purple-50 transition-colors font-medium">
            Editar perfil
          </button>
          <button type="button" (click)="closeMenus()" class="w-full px-4 py-2 text-left hover:bg-purple-50 transition-colors font-medium">
            Painel de Administrador
          </button>

          <hr class="my-2 border-gray-200">

          <button type="button" (click)="closeMenus()" class="w-full px-4 py-2 text-left hover:bg-purple-50 transition-colors font-medium">
            Definições
          </button>
          <button type="button" (click)="closeMenus()" class="w-full px-4 py-2 text-left hover:bg-purple-50 transition-colors font-medium text-red-500">
            Terminar Sessão
          </button>
        </div>
      }
    </div>

  </div>
</nav>
